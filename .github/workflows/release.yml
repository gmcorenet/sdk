name: Build Framework Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Create directories
        run: |
          mkdir -p vendor/gmcore
          for dir in gmcore-*/; do
            if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
              rm -rf "vendor/gmcore/$(basename $dir)"
              cp -r "$dir" vendor/gmcore/
            fi
          done

      - name: Create framework structure
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK="gmcore-framework-${VERSION}"
          mkdir -p "$FRAMEWORK"/{bin,cmd/app,config,public,var/{cache,log,tmp},src,tests,migrations,templates,vendor/gmcore}
          cp -r vendor/gmcore/* "$FRAMEWORK/vendor/gmcore/"

      - name: Create go.mod
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK="gmcore-framework-${VERSION}"
          cat > "$FRAMEWORK/go.mod" << 'GOMODEOF'
          module github.com/gmcore/app

          go 1.21

          require (
          	gmcore.net/gmcore-config vVERSION
          	gmcore.net/gmcore-crud vVERSION
          	gmcore.net/gmcore-encryption vVERSION
          	gmcore.net/gmcore-events vVERSION
          	gmcore.net/gmcore-router vVERSION
          	gmcore.net/gmcore-settings vVERSION
          	gmcore.net/gmcore-store vVERSION
          	gmcore.net/gmcore-uuid vVERSION
          )

          replace (
          	gmcore.net/gmcore-config => ./vendor/gmcore/gmcore-config
          	gmcore.net/gmcore-crud => ./vendor/gmcore/gmcore-crud
          	gmcore.net/gmcore-encryption => ./vendor/gmcore/gmcore-encryption
          	gmcore.net/gmcore-events => ./vendor/gmcore/gmcore-events
          	gmcore.net/gmcore-router => ./vendor/gmcore/gmcore-router
          	gmcore.net/gmcore-settings => ./vendor/gmcore/gmcore-settings
          	gmcore.net/gmcore-store => ./vendor/gmcore/gmcore-store
          	gmcore.net/gmcore-uuid => ./vendor/gmcore/gmcore-uuid
          )
          GOMODEOF
          sed -i "s/vVERSION/v${VERSION}/g" "$FRAMEWORK/go.mod"

      - name: Build tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK="gmcore-framework-${VERSION}"
          tar -czf "gmcore-framework-${VERSION}.tar.gz" "$FRAMEWORK"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: gmcore-framework-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
