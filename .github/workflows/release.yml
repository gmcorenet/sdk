name: Build Framework Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get SDK packages
        run: |
          mkdir -p vendor/gmcore
          for dir in gmcore-*; do
            if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
              cp -r "$dir" vendor/gmcore/
            fi
          done

      - name: Create framework structure
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK_DIR="gmcore-framework-${VERSION}"

          mkdir -p "$FRAMEWORK_DIR"/{bin,cmd/app,config,public,var/{cache,log,tmp},src,tests,migrations,templates,vendor/gmcore}

          cp -r vendor/gmcore/* "$FRAMEWORK_DIR/vendor/gmcore/"

      - name: Create go.mod for framework
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK_DIR="gmcore-framework-${VERSION}"

          cat > "$FRAMEWORK_DIR/go.mod" << EOF
          module github.com/gmcore/app

          go 1.21

          require (
          	gmcore.io/gmcore-config v${VERSION}
          	gmcore.io/gmcore-crud v${VERSION}
          	gmcore.io/gmcore-encryption v${VERSION}
          	gmcore.io/gmcore-events v${VERSION}
          	gmcore.io/gmcore-router v${VERSION}
          	gmcore.io/gmcore-settings v${VERSION}
          	gmcore.io/gmcore-store v${VERSION}
          	gmcore.io/gmcore-uuid v${VERSION}
          )

          replace (
          	gmcore.io/gmcore-config => ./vendor/gmcore/gmcore-config
          	gmcore.io/gmcore-crud => ./vendor/gmcore/gmcore-crud
          	gmcore.io/gmcore-encryption => ./vendor/gmcore/gmcore-encryption
          	gmcore.io/gmcore-events => ./vendor/gmcore/gmcore-events
          	gmcore.io/gmcore-router => ./vendor/gmcore/gmcore-router
          	gmcore.io/gmcore-settings => ./vendor/gmcore/gmcore-settings
          	gmcore.io/gmcore-store => ./vendor/gmcore/gmcore-store
          	gmcore.io/gmcore-uuid => ./vendor/gmcore/gmcore-uuid
          )
          EOF

      - name: Run go mod tidy
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK_DIR="gmcore-framework-${VERSION}"
          cd "$FRAMEWORK_DIR"
          go mod tidy

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FRAMEWORK_DIR="gmcore-framework-${VERSION}"
          tar -czf "gmcore-framework-${VERSION}.tar.gz" "$FRAMEWORK_DIR"

      - name: Compute SHA256
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sha256sum "gmcore-framework-${VERSION}.tar.gz" | awk '{print $1}' > "gmcore-framework-${VERSION}.tar.gz.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gmcore-framework-*.tar.gz
            gmcore-framework-*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
